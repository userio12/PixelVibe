name: Android CI (Playback)

on:
  push:
    branches: [ feature/mpv-playback ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'reference/**'
  pull_request:
    branches: [ feature/mpv-playback ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'reference/**'
  workflow_dispatch:

jobs:
  verify:
    name: Verify Project
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check MPV AAR exists in release
        run: |
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" \
            "https://github.com/userio12/PixelVibe/releases/download/v0.0.1/mpv-android-lib-v0.0.1.aar")
          if [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "✓ MPV AAR available in GitHub Releases"
          else
            echo "::error::MPV AAR not found in releases (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Download MPV AAR
        run: |
          mkdir -p app/libs
          curl -sL -o app/libs/mpv-android-lib-v0.0.1.aar \
            "https://github.com/userio12/PixelVibe/releases/download/v0.0.1/mpv-android-lib-v0.0.1.aar"
          SIZE=$(stat -c%s app/libs/mpv-android-lib-v0.0.1.aar 2>/dev/null || echo 0)
          if [ "$SIZE" -gt 1000000 ]; then
            echo "✓ MPV AAR downloaded: $(du -h app/libs/mpv-android-lib-v0.0.1.aar | cut -f1)"
          else
            echo "::error::MPV AAR download failed"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      - name: Verify dependencies resolve
        run: ./gradlew dependencies --configuration debugRuntimeClasspath --no-daemon || true

      - name: Project Summary
        run: |
          echo "### 📱 PixelVibe — Playback Branch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ MPV AAR verified ($(du -h app/libs/mpv-android-lib-v0.0.1.aar | cut -f1))" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Build Instructions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The MPV AAR contains Kotlin metadata compiled with a pre-release" >> $GITHUB_STEP_SUMMARY
          echo "Kotlin version. **CI builds cannot compile it** — you must build locally:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "git checkout feature/mpv-playback" >> $GITHUB_STEP_SUMMARY
          echo "./gradlew assembleDebug    # debug APK" >> $GITHUB_STEP_SUMMARY
          echo "./gradlew assembleRelease  # release APKs with ABI splits" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Output APKs:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`app/build/outputs/apk/debug/\` — debug APK" >> $GITHUB_STEP_SUMMARY
          echo "- \`app/build/outputs/apk/release/\` — release APKs (arm64-v8a, armeabi-v7a, x86, x86_64)" >> $GITHUB_STEP_SUMMARY
