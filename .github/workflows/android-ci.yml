name: Android CI (Playback)

on:
  push:
    branches: [ feature/mpv-playback ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'reference/**'
  pull_request:
    branches: [ feature/mpv-playback ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'reference/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"
  TERM: dumb

jobs:
  # ─────────────────────────────────────────────
  # Build debug APK (single ABI, with MPV AAR)
  # Note: Release ABI splits require local build
  # because the MPV AAR Kotlin metadata is
  # compiled with a pre-release Kotlin version.
  # ─────────────────────────────────────────────
  build-debug:
    name: Build Debug APK (arm64-v8a + MPV)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download MPV AAR
        run: |
          mkdir -p app/libs
          curl -sL -o app/libs/mpv-android-lib-v0.0.1.aar \
            "https://github.com/userio12/PixelVibe/releases/download/v0.0.1/mpv-android-lib-v0.0.1.aar"
          SIZE=$(stat -c%s app/libs/mpv-android-lib-v0.0.1.aar 2>/dev/null || echo 0)
          if [ "$SIZE" -gt 1000000 ]; then
            echo "✓ MPV AAR downloaded: $(du -h app/libs/mpv-android-lib-v0.0.1.aar | cut -f1)"
          else
            echo "::error::MPV AAR download failed"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PixelVibe-debug-arm64-v8a
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: APK Summary
        run: |
          echo "### 📱 Debug APK (arm64-v8a)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for apk in app/build/outputs/apk/debug/*.apk; do
            name=$(basename "$apk")
            size=$(du -h "$apk" | cut -f1)
            echo "| \`$name\` | $size |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Release APKs with ABI splits must be built locally**" >> $GITHUB_STEP_SUMMARY
          echo "The MPV AAR contains Kotlin metadata compiled with a pre-release" >> $GITHUB_STEP_SUMMARY
          echo "Kotlin version that is not yet available on CI runners." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "./gradlew assembleRelease" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
