name: Android CI

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'reference/**'
  pull_request:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'reference/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"
  TERM: dumb

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      - name: Run Android Lint
        run: ./gradlew lintDebug --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

  # ─────────────────────────────────────────────
  # Job 2: Release APKs with ABI Splits
  # Produces: arm64-v8a, armeabi-v7a, x86, x86_64 + universal
  # ─────────────────────────────────────────────
  build-release:
    name: Build Release APKs (ABI Splits)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      - name: Create debug keystore for signing
        run: |
          mkdir -p app/release
          keytool -genkey -v \
            -keystore app/release/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

      - name: Build Release APKs (all ABI splits)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List generated APKs
        run: |
          echo "### 📱 Release APKs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture | File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|------|------|" >> $GITHUB_STEP_SUMMARY
          for apk in app/build/outputs/apk/release/*.apk; do
            name=$(basename "$apk")
            # Extract ABI from filename
            abi="unknown"
            if echo "$name" | grep -q "arm64-v8a"; then
              abi="arm64-v8a"
            elif echo "$name" | grep -q "armeabi-v7a"; then
              abi="armeabi-v7a"
            elif echo "$name" | grep -q "x86_64"; then
              abi="x86_64"
            elif echo "$name" | grep -q "x86"; then
              abi="x86"
            elif echo "$name" | grep -q "universal"; then
              abi="universal"
            fi
            size=$(du -h "$apk" | cut -f1)
            echo "| **$abi** | \`$name\` | $size |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: release-arm64-v8a
          path: app/build/outputs/apk/release/*arm64-v8a*.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: release-armeabi-v7a
          path: app/build/outputs/apk/release/*armeabi-v7a*.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload x86 APK
        uses: actions/upload-artifact@v4
        with:
          name: release-x86
          path: app/build/outputs/apk/release/*x86*.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: release-x86_64
          path: app/build/outputs/apk/release/*x86_64*.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: release-universal
          path: app/build/outputs/apk/release/*universal*.apk
          retention-days: 30
          if-no-files-found: ignore

  # ─────────────────────────────────────────────
  # Job 3: Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14
